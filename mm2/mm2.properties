# =============================================================================
# MirrorMaker 2 — Standalone configuration
# Replicates order-events from the source cluster (3 brokers) to the
# destination cluster (1 broker).
#
# Replicated topic on dest will be named:  source.order-events
# (MirrorMaker2 prefixes the source alias by default)
# =============================================================================

# ── Cluster aliases ──────────────────────────────────────────────────────────
clusters = source, dest

# ── Bootstrap servers ────────────────────────────────────────────────────────
source.bootstrap.servers = kafka:9092,kafka-2:9092,kafka-3:9092
dest.bootstrap.servers   = kafka-dest:9092

# ── Enable replication: source → dest only ───────────────────────────────────
source->dest.enabled = true
dest->source.enabled = false

# ── Topics to replicate ──────────────────────────────────────────────────────
source->dest.topics = order-events

# ── Replication factor for replicated topics on dest ─────────────────────────
# dest cluster has 1 broker so RF=1 is the max
replication.factor = 1

# ── Consumer group offset sync ───────────────────────────────────────────────
# Keeps consumer group offsets in sync so failover consumers can pick up
# where source consumers left off.
source->dest.sync.group.offsets.enabled          = true
source->dest.sync.group.offsets.interval.seconds = 30

# ── Heartbeat & checkpoint topics ────────────────────────────────────────────
source->dest.emit.heartbeats.enabled  = true
source->dest.emit.checkpoints.enabled = true

# ── Replication factor for MM2 internal topics on source cluster ──────────────
# Source cluster has 3 brokers — use RF=3 so MM2 internal topics survive
# a single broker failure. min.insync.replicas=2 is satisfied with 3 replicas.
checkpoints.topic.replication.factor  = 3
heartbeats.topic.replication.factor   = 3
offset-syncs.topic.replication.factor = 3

# ── Kafka Connect internal storage (MM2 runs embedded Connect) ───────────────
# These are written to the SOURCE cluster — match its RF=3 / min.isr=2.
offset.storage.replication.factor  = 3
status.storage.replication.factor  = 3
config.storage.replication.factor  = 3